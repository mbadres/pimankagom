name: Deploy to Firebase

on:
  workflow_run:
    workflows: ['Build']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: build.yaml
          workflow_conclusion: success
          name: build-files
          path: build/web/

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase deploy --only hosting --project pimankagom
